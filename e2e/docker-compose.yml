services:
  # PostgreSQL (BFF用)
  bff-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bff_db
      POSTGRES_USER: bff_user
      POSTGRES_PASSWORD: bff_password
    ports:
      - "5432:5432"
    volumes:
      - bff-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bff_user -d bff_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  # Flyway migration (BFF用)
  bff-flyway:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../services/bff/db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://bff-db:5432/bff_db
      FLYWAY_USER: bff_user
      FLYWAY_PASSWORD: bff_password
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    depends_on:
      bff-db:
        condition: service_healthy
    networks:
      - e2e-network

  # BFF (Go Echo server)
  bff:
    build:
      context: ../services/bff
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENVIRONMENT: development
      DATABASE_URL: postgres://bff_user:bff_password@bff-db:5432/bff_db?sslmode=disable
      SESSION_SECRET: e2e-test-secret-key
      SESSION_EXPIRY: "86400"
      LOG_LEVEL: debug
    depends_on:
      bff-db:
        condition: service_healthy
      bff-flyway:
        condition: service_completed_successfully
    networks:
      - e2e-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BFF_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - bff
    networks:
      - e2e-network

volumes:
  bff-db-data:

networks:
  e2e-network:
    driver: bridge
