syntax = "proto3";

package merchant;

import "common.proto";

option go_package = "github.com/ikechin/agent-teams-backend/internal/pb";

service MerchantService {
  rpc ListMerchants(ListMerchantsRequest) returns (ListMerchantsResponse);
  rpc GetMerchant(GetMerchantRequest) returns (MerchantResponse);
  rpc CreateMerchant(CreateMerchantRequest) returns (MerchantResponse);
  rpc UpdateMerchant(UpdateMerchantRequest) returns (MerchantResponse);
  rpc DeleteMerchant(DeleteMerchantRequest) returns (DeleteMerchantResponse);
}

message Merchant {
  string merchant_id = 1;
  string merchant_code = 2;
  string name = 3;
  string address = 4;
  string contact_person = 5;
  string phone = 6;
  string email = 7;
  bool is_active = 8;
  string created_at = 9;
  string updated_at = 10;
}

message ListMerchantsRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
}

message ListMerchantsResponse {
  repeated Merchant merchants = 1;
  common.Pagination pagination = 2;
}

message GetMerchantRequest {
  string merchant_id = 1;
}

message CreateMerchantRequest {
  string name = 1;
  string address = 2;
  string contact_person = 3;
  string phone = 4;
  string email = 5;
  string created_by = 6; // user_id from BFF (for audit)
}

message UpdateMerchantRequest {
  string merchant_id = 1;
  string name = 2;
  string address = 3;
  string contact_person = 4;
  string phone = 5;
  string email = 6;
  string updated_by = 7; // user_id from BFF (for audit)
}

message DeleteMerchantRequest {
  string merchant_id = 1;
  string deleted_by = 2; // user_id from BFF (for audit)
}

message DeleteMerchantResponse {}

message MerchantResponse {
  Merchant merchant = 1;
}
