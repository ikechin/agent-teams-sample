syntax = "proto3";

package approval;

import "common.proto";

option go_package = "github.com/ikechin/agent-teams-backend/internal/pb";

service ApprovalService {
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc ListWorkflowsByContract(ListWorkflowsByContractRequest) returns (ListWorkflowsByContractResponse);
  rpc GetApprovalWorkflow(GetApprovalWorkflowRequest) returns (ApprovalWorkflowResponse);
  rpc ApproveContract(ApproveContractRequest) returns (ApprovalWorkflowResponse);
  rpc RejectContract(RejectContractRequest) returns (ApprovalWorkflowResponse);
  rpc CountPendingApprovals(CountPendingApprovalsRequest) returns (CountPendingApprovalsResponse);
  rpc ListApprovalHistory(ListApprovalHistoryRequest) returns (ListApprovalHistoryResponse);
}

message ApprovalWorkflowItem {
  string workflow_id = 1;
  string contract_id = 2;
  string contract_number = 3;
  string merchant_name = 4;
  string service_name = 5;
  string requester_id = 6;
  optional string approver_id = 7;
  string status = 8;
  string old_monthly_fee = 9;
  string new_monthly_fee = 10;
  string old_initial_fee = 11;
  string new_initial_fee = 12;
  string requested_at = 13;
  optional string approved_at = 14;
  optional string rejection_reason = 15;
}

message ListPendingApprovalsRequest {
  int32 page = 1;
  int32 limit = 2;
  string exclude_requester_id = 3;
}

message ListPendingApprovalsResponse {
  repeated ApprovalWorkflowItem workflows = 1;
  common.Pagination pagination = 2;
}

message ListWorkflowsByContractRequest {
  string contract_id = 1;
  // Optional status filter. Empty = return all statuses (PENDING/APPROVED/REJECTED).
  string status = 2;
  // Optional limit (default 20, max 100).
  int32 limit = 3;
}

message ListWorkflowsByContractResponse {
  // Ordered by requested_at DESC (newest first).
  repeated ApprovalWorkflowItem workflows = 1;
}

message GetApprovalWorkflowRequest {
  string workflow_id = 1;
}

message ApproveContractRequest {
  string workflow_id = 1;
  string approver_id = 2;
}

message RejectContractRequest {
  string workflow_id = 1;
  string approver_id = 2;
  string rejection_reason = 3;
}

message ApprovalWorkflowResponse {
  ApprovalWorkflowItem workflow = 1;
}

message CountPendingApprovalsRequest {
  // 空文字なら除外なし、UUID 指定で requester_id != $1 の SoD 除外
  string exclude_requester_id = 1;
}

message CountPendingApprovalsResponse {
  int64 count = 1;
}

message ListApprovalHistoryRequest {
  // Empty = all statuses. "PENDING" / "APPROVED" / "REJECTED" supported.
  string status_filter = 1;
  // Partial match (ILIKE). Empty = no filter.
  string contract_number = 2;
  // Exact UUID match. Empty = no filter.
  string requester_id = 3;
  // Exact UUID match. Empty = no filter.
  string approver_id = 4;
  // RFC3339. Empty = no lower bound.
  string requested_from = 5;
  // RFC3339. Empty = no upper bound.
  string requested_to = 6;
  // 1-indexed. Default 1.
  int32 page = 7;
  // Default 20, max 100.
  int32 limit = 8;
}

message ListApprovalHistoryResponse {
  // Ordered by requested_at DESC.
  repeated ApprovalWorkflowItem workflows = 1;
  common.Pagination pagination = 2;
}
